<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지안이의 성장일기 - 우리 아이 첫 성장 기록</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FAF8F5;
            color: #1E293B;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 36px;
            box-shadow: 0 10px 25px rgba(253, 218, 196, 0.4);
            margin-bottom: 24px;
            border: 4px solid #FFF;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #0F172A;
            margin: 0 0 16px 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: #64748B;
            margin: 0 0 40px 0;
            line-height: 1.6;
        }

        .highlight {
            color: #F87171;
            font-weight: 700;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .badge {
            background-color: #0F172A;
            color: #FFF;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
            transition: transform 0.2s;
        }

        .badge:hover {
            transform: translateY(-2px);
        }

        .badge.google {
            background-color: #4F46E5;
        }

        .footer {
            margin-top: auto;
            padding: 30px 20px;
            background-color: #FFF;
            border-top: 1px solid #E2E8F0;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 12px;
        }

        .footer-links a {
            color: #475569;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .footer-links a:hover {
            color: #0F172A;
            text-decoration: underline;
        }

        .copyright {
            font-size: 12px;
            color: #94A3B8;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 앱 로고 -->
        <img class="logo" src="./assets/images/ios-icon.png" alt="지안이의 성장일기 로고">

        <h1>지안이의 성장일기 👶🍼</h1>
        <p>우리 소중한 아기의 <span class="highlight">하루 패턴, 소중한 기록, 성장 달력</span>까지!<br>엄마와 아빠가 함께 기록하고 공유하는 가장 따뜻한 아기 일기장입니다.
        </p>

        <!-- 다운로드 뱃지 예시 -->
        <div class="badge-container">
            <a href="#" class="badge"> App Store에서 받기</a>
            <a href="#" class="badge google">▶ Google Play에서 받기</a>
        </div>
    </div>

    <!-- 하단 푸터 (개인정보처리방침 링크 탑재) -->
    <div class="footer">
        <div class="footer-links">
            <a href="./privacy.html">🔒 개인정보처리방침</a>
            <a href="#">📝 이용약관</a>
        </div>
        <div class="copyright">
            &copy; 2026 지안이의 성장일기. All rights reserved.
        </div>
    </div>
</body>

</html>
