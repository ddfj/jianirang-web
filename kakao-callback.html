<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지안이의 성장일기 - 로그인 인증</title>
</head>

<body
    style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: sans-serif; background-color: #f9f9f9; margin: 0;">

    <h2 style="color: #333; margin-bottom: 8px;">지안이의 성장일기</h2>
    <p style="color: #666;">카카오 로그인 인증 중입니다. 잠시 후 앱으로 이동합니다...</p>

    <script>
        // 1. 주소창 뒤에 카카오가 붙여준 ?code=xxxx 가져오기
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        if (code) {
            // 2. 내 앱의 순수 딥링크 주소 조립
            const appProjectId = '6a30d14400362ff7b204';
            const appUrl = 'appwrite-callback-' + appProjectId + '://?code=' + code;

            console.log('아이폰 앱으로 딥링크 이동 시도:', appUrl);

            // 3. 브라우저가 준비되면 아이폰 앱 강제 깨우기 실행
            setTimeout(function () {
                window.location.href = appUrl;
            }, 100);
        } else {
            document.querySelector('p').innerText = '인증 코드가 올바르지 않습니다.';
        }
    </script>
</body>

</html>
